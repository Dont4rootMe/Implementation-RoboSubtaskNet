# Default RoboSubtaskNet configuration.
# Hyperparameters mirror Section 10.1 of IMPLEMENTATION_PLAN.md.
# Per-dataset configs (gtea.yaml, breakfast.yaml, robosubtask.yaml) compose
# this file via Hydra and override only what is dataset-specific.

defaults:
  - _self_

model:
  num_stages: 4
  num_layers: 10
  feature_dim: 1024
  hidden_dim: 64
  num_classes: 9

losses:
  lambda_tmse: 0.15
  gamma_trans: 0.15
  tmse_tau: 4.0

training:
  batch_size: 1            # variable-length videos: bs=1 is the MS-TCN standard
  num_epochs: 50
  optimizer: adam
  lr: 5e-4
  weight_decay: 1e-4
  scheduler: cosine
  grad_clip: 5.0
  amp: true                # mixed precision

dataset:
  name: default
  data_root: data
  feature_dir: data/features
  splits_dir: data/splits
  annotations_dir: data/annotations
  mapping_file: data/mapping.txt
  num_workers: 2
  pin_memory: true
  split: split1
  train_bundle: null
  test_bundle: null
  feature_format: npz       # one of: npz (rgb+flow keys) or split2048 (single .npy)

seed: 42

logging:
  log_every: 50
  eval_every_epochs: 1
  save_top_k: 3
  log_dir: logs
  checkpoint_dir: checkpoints
  tensorboard: true
  wandb: false
